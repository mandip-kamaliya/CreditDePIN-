[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
creditcoin_testnet = "https://rpc.cc3-testnet.creditcoin.network"

[etherscan]
creditcoin_testnet = { key = "placeholder", url = "https://creditcoin-testnet.blockscout.com/api" }

[profile.default.optimizer_details]
yul = true
